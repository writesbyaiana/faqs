<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiana Writes | Interactive FAQ Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: {
                            cream: '#fbfaf7',
                            dark: '#2c2c27',
                            accent: '#b48a1d',
                            border: '#e9e4da',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fbfaf7; color: #2c2c27; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e9e4da; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:py-6">

    <div class="w-full max-w-md mx-auto flex flex-col h-[88vh] bg-white border border-brand-border rounded-2xl shadow-sm overflow-hidden">
        
        <!-- Chat App Header -->
        <div class="p-4 border-b border-brand-border bg-white flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-full border border-brand-border overflow-hidden bg-stone-50">
                    <img src="aiana.png" alt="Aiana" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<i class=\"fa-solid fa-user text-xs text-stone-400 mt-2.5\"></i>'">
                </div>
                <div>
                    <h1 class="text-xs font-bold uppercase tracking-tight">Aiana Writes</h1>
                    <p class="text-[10px] text-amber-600 font-semibold flex items-center">
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-500 mr-1.5 animate-pulse"></span>Smart Assistant
                    </p>
                </div>
            </div>
            <a href="https://writesbyaiana.github.io/vouchesbyaiana/" target="_blank" class="text-[10px] font-bold text-brand-accent hover:underline">Vouches Hub 🔗</a>
        </div>

        <!-- Chat History Pane -->
        <div id="chatWindow" class="flex-1 p-4 overflow-y-auto space-y-4 bg-brand-cream/30 chat-scroll">
            <div class="flex items-start space-x-2 max-w-[88%] fade-in">
                <div class="p-3 bg-white border border-brand-border rounded-2xl rounded-tl-none text-xs leading-relaxed shadow-sm">
                    Hey there! I am your interactive booking assistant. Tap an option below to pull up exact rates, view my terms infographic, or calculate custom "tingi" chapters! ✨
                </div>
            </div>
        </div>

        <!-- Dynamic Contextual Controls Dock -->
        <div class="p-3 border-t border-brand-border bg-white space-y-2">
            <!-- Dynamic Category Navigation Breadcrumb -->
            <div class="flex justify-between items-center px-1">
                <span id="menuTitle" class="text-[9px] font-bold uppercase tracking-widest text-stone-400">Select an Area:</span>
                <button id="backBtn" onclick="renderMainMenu()" class="hidden text-[9px] font-bold uppercase tracking-wide text-brand-accent hover:text-amber-700">
                    <i class="fa-solid fa-arrow-left-long mr-1"></i> Main Menu
                </button>
            </div>
            
            <!-- Live Target Container for Interactive Buttons & Calculators -->
            <div id="interactiveDock" class="flex flex-col space-y-1.5 max-h-[240px] overflow-y-auto scrollbar">
                <!-- Loaded via JS Injection -->
            </div>
        </div>
    </div>

    <!-- Static Tiny Footer -->
    <div class="text-center text-[9px] font-bold tracking-widest text-stone-300 uppercase mt-4">
        Est. 2021 • Premium Academic Framework
    </div>

    <!-- Smart Logic Core Engine -->
    <script>
        const chatWindow = document.getElementById('chatWindow');
        const interactiveDock = document.getElementById('interactiveDock');
        const menuTitle = document.getElementById('menuTitle');
        const backBtn = document.getElementById('backBtn');

        const itemRegistry = {
            'Introduction': 150, 'Background of the Study': 150, 'Statement of the Problem': 100,
            'Significance of the Study': 100, 'Theoritical Framework': 200, 'Conceptual Framework': 200,
            'Scope and Limitation': 100, 'Definition of Terms': 100,
            'Research Design': 100, 'Sampling Technique': 150, 'Respondents/Participants': 150,
            'Research Instrument': 100, 'Data Gathering Procedure': 150, 'Research Locale': 150,
            'Statistical Treatment': 200, 'Data Interpretation': 100, 'Data Analysis / Discussion': 500,
            'Summary': 300, 'Findings': 500, 'Conclusion': 500, 'Recommendations': 300
        };

        let selectedItems = new Set();

        function appendUserMessage(text) {
            const el = document.createElement('div');
            el.className = "flex items-start justify-end max-w-[85%] ml-auto fade-in";
            el.innerHTML = `<div class="p-3 bg-stone-200 text-stone-800 rounded-2xl rounded-tr-none text-xs font-medium shadow-sm">${text}</div>`;
            chatWindow.appendChild(el);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendBotMessage(htmlContent) {
            setTimeout(() => {
                const el = document.createElement('div');
                el.className = "flex items-start space-x-2 max-w-[88%] fade-in";
                el.innerHTML = `<div class="p-3 bg-white border border-brand-border rounded-2xl rounded-tl-none text-xs leading-relaxed shadow-sm text-stone-700">${htmlContent}</div>`;
                chatWindow.appendChild(el);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 300);
        }

        function renderMainMenu() {
            backBtn.classList.add('hidden');
            menuTitle.textContent = "Select an Area:";
            selectedItems.clear();

            interactiveDock.innerHTML = `
                <button onclick="handleMenuClick('about')" class="w-full text-left p-2.5 bg-brand-cream hover:bg-stone-100 border border-brand-border rounded-xl text-xs font-medium transition-colors">✨ Who is Aiana? (Credentials)</button>
                <button onclick="handleMenuClick('view_terms')" class="w-full text-left p-2.5 bg-amber-50 hover:bg-amber-100 border border-amber-200 rounded-xl text-xs font-bold text-amber-900 transition-colors">🖼️ View Terms & Conditions Image</button>
                <button onclick="handleMenuClick('bundles')" class="w-full text-left p-2.5 bg-brand-cream hover:bg-stone-100 border border-brand-border rounded-xl text-xs font-medium transition-colors">📦 Full-Blown Bundle Packages</button>
                <button onclick="handleMenuClick('rrl_logic')" class="w-full text-left p-2.5 bg-brand-cream hover:bg-stone-100 border border-brand-border rounded-xl text-xs font-medium transition-colors">🔍 Chapter 2 & RRL Breakdown Rules</button>
                <button onclick="handleMenuClick('tingi_calc')" class="w-full text-left p-2.5 bg-brand-cream hover:bg-stone-100 border border-brand-border rounded-xl text-xs font-medium transition-colors">🧮 Custom "Tingi" Section Calculator</button>
                <button onclick="handleMenuClick('others')" class="w-full text-left p-2.5 bg-brand-cream hover:bg-stone-100 border border-brand-border rounded-xl text-xs font-medium transition-colors">📁 Programming Systems & Other Write-ups</button>
            `;
        }

        function handleMenuClick(route) {
            backBtn.classList.remove('hidden');

            if (route === 'about') {
                appendUserMessage("Who is Aiana?");
                menuTitle.textContent = "About Aiana:";
                appendBotMessage(`🎓 <strong>About the Writer:</strong><br>• Academic Writer from <strong>UST (University of Santo Tomas)</strong>.<br>• Consistent <strong>Dean's Lister since 2020</strong>.<br>• Premium Ghostwriting & System Development Service operating successfully since 2021!`);
                interactiveDock.innerHTML = `<p class="text-[11px] text-stone-400 p-2 italic">Select another category or click back to return.</p>`;
            } 
            
            else if (route === 'view_terms') {
                appendUserMessage("Show me your Terms Graphic");
                menuTitle.textContent = "Terms and Conditions Flyer:";
                appendBotMessage(`🖼️ <strong>Official Guidelines (faq.png):</strong><br><br><div class="rounded-xl overflow-hidden border border-brand-border my-1.5 shadow-sm bg-stone-100"><img src="faq.png" alt="Terms and Conditions" class="w-full h-auto object-contain" onerror="this.parentElement.innerHTML='<div class=\"p-6 text-center text-stone-400 text-xs font-medium\"><i class=\"fa-regular fa-image text-lg mb-1 block\"></i>[ faq.png image placeholder ]</div>'"></div><br>• 50% initial downpayment required before drafting begins.<br>• Revisions accepted within 36 hours post-delivery.`);
                interactiveDock.innerHTML = `<p class="text-[11px] text-stone-400 p-2 italic">Make sure your asset is named "faq.png" in your repository root!</p>`;
            }

            else if (route === 'bundles') {
                appendUserMessage("Show me Full Paper Packages");
                menuTitle.textContent = "Full Bundles (Chapters 1-5):";
                appendBotMessage(`📦 <strong>Full-Blown Thesis Packages (Chapters 1-5 Complete):</strong><br><br>• 📈 <strong>Quantitative Study Package:</strong> ₱5,500<br>• 📑 <strong>Qualitative Study Package:</strong> ₱6,000<br>• 🎓 <strong>Master's Level Thesis:</strong> ₱8,000<br><br><em>*Note: Includes complete alignment across all chapters. DM for slot bookings!</em>`);
                interactiveDock.innerHTML = `<p class="text-[11px] text-stone-400 p-2 italic">Ready to reserve a bundle slot? Drop a DM on my socials!</p>`;
            }

            else if (route === 'rrl_logic') {
                appendUserMessage("How are RRL / Chapter 2 priced?");
                menuTitle.textContent = "Chapter 2 & RRL Matrix:";
                appendBotMessage(`🔍 <strong>Chapter 2 Scope and Reference System Pricing:</strong><br><br>• <strong>Reference List Only (₱20–₱30 per item):</strong> I source relevant local/foreign references for you to use.<br><br>• <strong>Written Citations ("Tingi"):</strong> ₱50 per Foreign study / ₱70 per Local study. <em>*APA/formatting reference list inclusions are already bundled in!</em><br><br>• <strong>Full Chapter 2 Package:</strong> Baseline starts at ₱900 for lighter workloads.`);
                interactiveDock.innerHTML = `<p class="text-[11px] text-stone-400 p-2 italic">Custom structural layouts are fully open for DM discussion.</p>`;
            }

            else if (route === 'others') {
                appendUserMessage("Systems, Business Plans, & Tasks");
                menuTitle.textContent = "Specialty & Technical Services:";
                appendBotMessage(`📁 <strong>Specialized System & Documents Matrix:</strong><br><br>• 💻 <strong>Computer Science & IT Programming Systems:</strong> Fully supported coding builds! Since I design/build full systems, rates are completely open-ended and <em>to be discussed</em> based on your requirements stack.<br><br>• 💼 <strong>Business Plans / Feasibility Studies:</strong> Flat ₱1,500 base baseline.<br>• 📝 <strong>General Assignments / Essays / Custom Tasks:</strong> Flexible rates determined upon prompt review.`);
                interactiveDock.innerHTML = `<p class="text-[11px] text-stone-400 p-2 italic">Drop your project specs straight into my DM for a review!</p>`;
            }

            else if (route === 'tingi_calc') {
                appendUserMessage("I want to calculate a mixed order");
                menuTitle.textContent = "Check sections to estimate total:";
                
                let checkListHtml = `<div class="space-y-1.5 max-h-[140px] overflow-y-auto border border-brand-border p-2 rounded-xl bg-stone-50 scrollbar">`;
                for (const [name, price] of Object.entries(itemRegistry)) {
                    checkListHtml += `
                        <label class="flex items-center justify-between text-xs p-1.5 bg-white border border-stone-200 rounded-lg cursor-pointer">
                            <span class="flex items-center"><input type="checkbox" value="${name}" onchange="updateLiveCalculation(this)" class="mr-2 accent-amber-600"> ${name}</span>
                            <span class="font-bold text-stone-500">₱${price}</span>
                        </label>`;
                }
                checkListHtml += `</div>
                    <label class="flex items-center justify-between text-xs p-2 bg-amber-50/60 border border-amber-200 rounded-xl cursor-pointer">
                        <span class="flex items-center"><input type="checkbox" id="titleCheck" class="mr-2 accent-amber-600"> 💡 Need a Custom Research Title?</span>
                        <span class="font-bold text-amber-900">+₱50</span>
                    </label>
                    <button onclick="compileCalculatedReceipt()" class="w-full py-2 bg-stone-900 text-white font-bold rounded-xl text-xs tracking-wide">Generate Calculation Summary Ticket</button>`;
                
                interactiveDock.innerHTML = checkListHtml;
                appendBotMessage("🧮 <strong>Custom Mixed Section Mode Activated:</strong><br>Check any combination of sections from Chapters 1, 3, 4, or 5 below. Then click 'Generate' to verify the baseline summary!");
            }
        }

        function updateLiveCalculation(checkbox) {
            if (checkbox.checked) { selectedItems.add(checkbox.value); } 
            else { selectedItems.delete(checkbox.value); }
        }

        function compileCalculatedReceipt() {
            let runningSum = 0;
            let breakdownLines = [];

            selectedItems.forEach(item => {
                runningSum += itemRegistry[item];
                breakdownLines.push(`• ${item} (₱${itemRegistry[item]})`);
            });

            if (document.getElementById('titleCheck') && document.getElementById('titleCheck').checked) {
                runningSum += 50;
                breakdownLines.push(`• Research Title Generation (₱50)`);
            }

            if (breakdownLines.length === 0) {
                alert("Please check at least one section checkbox to generate a calculated estimate!");
                return;
            }

            let responseBlock = `🧮 <strong>Live Calculated "Tingi" Base Brief Estimate:</strong><br><br>`;
            responseBlock += breakdownLines.join('<br>') + `<br><br>`;
            responseBlock += `💰 <strong>Estimated Base Total: ₱${runningSum.toLocaleString()}</strong><br><br>`;
            responseBlock += `⚠️ <strong>Crucial Client Notice:</strong> This calculation represents standard component template pricing. The final billing value could be <em>higher or lower</em> depending on your school template parts, volume, and urgency rules. Send me a DM on socials to finalize your structural parameters! 🤍`;

            appendUserMessage("Compile Checked Section Estimates");
            appendBotMessage(responseBlock);
        }

        document.addEventListener('DOMContentLoaded', () => { renderMainMenu(); });
    </script>
</body>
</html>
