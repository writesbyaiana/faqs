<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiana Writes | Smart Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: {
                            cream: '#fbfaf7',
                            dark: '#2c2c27',
                            accent: '#b48a1d',
                            border: '#e9e4da',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fbfaf7; color: #2c2c27; overflow: hidden; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e9e4da; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* --- True SVG Continuous Cursive Writing Preloader --- */
        #preloader {
            position: fixed;
            inset: 0;
            background-color: #ffffff; /* Starts pure crisp white */
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* SVG Cursive Path Signature Setup */
        .signature-svg {
            width: 280px;
            height: auto;
            overflow: visible;
        }

        .signature-path {
            stroke: #2c2c27; /* Matches your brand index dark tone */
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            /* Adjust stroke values to simulate an unbroken continuous fluid line */
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            animation: writeSignature 1.8s cubic-bezier(0.45, 0, 0.55, 1) forwards;
        }

        /* Long dynamic tail running from the end of letter 's' to screen edge */
        .extended-tail-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 100vw;
            transform: translate(40px, 12px); /* Offsets right from the signature end */
            z-index: 110;
        }

        .horizontal-tail-line {
            width: 0vw;
            height: 2.5px;
            background-color: #2c2c27;
            border-radius: 2px;
            animation: stretchTailToEdge 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 1.7s;
        }

        /* Right-to-Left Liquid Wipe Panel using brand beige */
        .brand-sweep-panel {
            position: absolute;
            inset: 0;
            background-color: #fbfaf7; /* Exact index background color */
            transform: translateX(100%);
            z-index: 105;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1);
        }

        /* Animation Timers */
        @keyframes writeSignature {
            to { stroke-dashoffset: 0; }
        }
        @keyframes stretchTailToEdge {
            to { width: 100vw; }
        }

        /* Active Sweep Trigger Classes */
        .execute-sweep { transform: translateX(0%); }
        .hide-loader-elements { opacity: 0; transition: opacity 0.3s ease-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:py-6">

    <!-- Cinematic Custom Preloader Screen -->
    <div id="preloader">
        <!-- The brand beige container that sweeps from Right to Left -->
        <div class="brand-sweep-panel" id="sweepPanel"></div>
        
        <!-- Live Signature Animation Container -->
        <div class="flex flex-col items-center justify-center relative z-10" id="loaderContent">
            <!-- Continuous SVG cursive layout trace -->
            <svg class="signature-svg" viewBox="0 0 300 80">
                <!-- Smooth custom handwritten mock path for 'aianawrites' -->
                <path class="signature-path" d="M15,55 C30,35 40,25 50,55 C58,35 65,30 72,55 C78,45 82,40 88,55 C98,30 108,25 118,55 C124,40 132,45 138,55 C145,20 152,15 158,55 C164,40 170,45 178,55 C182,35 188,35 194,55 C200,20 206,20 212,55 C218,40 224,40 232,45 C240,45 248,30 256,40 C264,48 270,55 285,42" />
            </svg>
            
            <!-- Long tail extending out from 's' directly to phone bounds -->
            <div class="extended-tail-wrapper">
                <div class="horizontal-tail-line"></div>
            </div>
        </div>
    </div>

    <!-- Main Chat Workspace -->
    <div class="w-full max-w-md mx-auto flex flex-col h-[88vh] bg-white border border-brand-border rounded-2xl shadow-sm overflow-hidden">
        
        <!-- Top Navigation Header -->
        <div class="p-4 border-b border-brand-border bg-white flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-full border border-brand-border overflow-hidden bg-stone-50">
                    <img src="aiana.png" alt="Aiana" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML=''">
                </div>
                <div>
                    <h1 class="text-xs font-bold uppercase tracking-tight">Aiana Writes</h1>
                    <p class="text-[10px] text-amber-600 font-semibold flex items-center">
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-500 mr-1.5 animate-pulse"></span>Live Smart Bot
                    </p>
                </div>
            </div>
            <a href="https://writesbyaiana.github.io/vouchesbyaiana/" target="_blank" class="text-[10px] font-bold text-brand-accent hover:underline">Vouches Hub</a>
        </div>

        <!-- Scrollable Active Chat Feed -->
        <div id="chatWindow" class="flex-1 p-4 overflow-y-auto space-y-4 bg-brand-cream/30 chat-scroll">
            <div class="flex items-start space-x-2 max-w-[88%] fade-in">
                <div class="p-3 bg-white border border-brand-border rounded-2xl rounded-tl-none text-xs leading-relaxed shadow-sm text-stone-700">
                    Welcome to my automated workspace assistant. You can click options from the menu below, or type your question directly into the chatbox. Try asking about rates, deadlines, or systems.
                </div>
            </div>
        </div>

        <!-- Dynamic Controls & Bottom Dock -->
        <div class="p-3 border-t border-brand-border bg-white space-y-2">
            <div class="flex justify-between items-center px-1">
                <span id="menuTitle" class="text-[9px] font-bold uppercase tracking-widest text-stone-400">Quick Menu Options:</span>
                <button id="backBtn" onclick="renderMainMenu()" class="hidden text-[9px] font-bold uppercase tracking-wide text-brand-accent hover:text-amber-700">
                    Back to Main Menu
                </button>
            </div>
            
            <!-- Quick Click Area -->
            <div id="interactiveDock" class="flex flex-col space-y-1.5 max-h-[160px] overflow-y-auto scrollbar">
                <!-- JS Menu Injection -->
            </div>

            <!-- Real-time Manual Chat Input Form -->
            <form id="chatForm" onsubmit="handleFormSubmit(event)" class="flex items-center space-x-2 pt-2 border-t border-stone-100">
                <input type="text" id="userInput" placeholder="Ask me something (e.g., magkano chap 1, rush)..." class="flex-1 px-3 py-2 bg-stone-50 border border-brand-border rounded-xl text-xs focus:outline-none focus:border-amber-500 transition-colors">
                <button type="submit" class="px-3 py-2 bg-stone-900 hover:bg-stone-800 text-white font-bold rounded-xl text-xs transition-colors">Send</button>
            </form>
        </div>
    </div>

    <div class="text-center text-[9px] font-bold tracking-widest text-stone-300 uppercase mt-4">
        Est. 2021 • Premium Academic Framework
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const interactiveDock = document.getElementById('interactiveDock');
        const menuTitle = document.getElementById('menuTitle');
        const backBtn = document.getElementById('backBtn');
        const userInput = document.getElementById('userInput');

        // Cinematic Sequence Timers for Right-to-Left Wipe
        window.addEventListener('DOMContentLoaded', () => {
            renderMainMenu();
            
            // 1. Wait for signature stroke (1.8s) + wait for tail line to reach edge (0.7s)
            setTimeout(() => {
                const sweepPanel = document.getElementById('sweepPanel');
                const loader = document.getElementById('preloader');
                const loaderContent = document.getElementById('loaderContent');
                
                // Trigger right-to-left brand beige block wipe
                sweepPanel.classList.add('execute-sweep');
                
                // Midway through the swipe mask overlay, hide text/white layout quietly
                setTimeout(() => {
                    loaderContent.classList.add('hide-loader-elements');
                    loader.style.backgroundColor = '#fbfaf7'; // Swaps hidden base to beige seamlessly
                }, 350);

                // Wipe complete: remove preloader node and return normal touch controls
                setTimeout(() => {
                    loader.remove();
                    document.body.style.overflow = 'auto';
                }, 800);

            }, 2400);
        });

        const itemRegistry = {
            'Introduction': 150, 'Background of the Study': 150, 'Statement of the Problem': 100,
            'Significance of the Study': 100, 'Theoritical Framework': 200, 'Conceptual Framework': 200,
            'Scope and Limitation': 100, 'Definition of Terms': 100,
            'Research Design': 100, 'Sampling Technique': 150, 'Respondents/Participants': 150,
            'Research Instrument': 100, 'Data Gathering Procedure': 150, 'Research Locale': 150,
            'Statistical Treatment': 200, 'Data Interpretation': 100, 'Data Analysis / Discussion': 500,
            'Summary': 300, 'Findings': 500, 'Conclusion': 500, 'Recommendations': 300
        };

        let selectedItems = new Set();

        function appendUserMessage(text) {
            const el = document.createElement('div');
            el.className = "flex items-start justify-end max-w-[85%] ml-auto fade-in";
            el.innerHTML = `<div class="p-3 bg-stone-200 text-stone-800 rounded-2xl rounded-tr-none text-xs font-medium shadow-sm">${text}</div>`;
            chatWindow.appendChild(el);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendBotMessage(htmlContent) {
            setTimeout(() => {
                const el = document.createElement('div');
                el.className = "flex items-start space-x-2 max-w-[88%] fade-in";
                el.innerHTML = `<div class="p-3 bg-white border border-brand-border rounded-2xl rounded-tl-none text-xs leading-relaxed shadow-sm text-stone-700">${htmlContent}</div>`;
                chatWindow.appendChild(el);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 250);
        }

        function renderMainMenu() {
            backBtn.classList.add('hidden');
            menuTitle.textContent = "Quick Menu Options:";
            selectedItems.clear();

            interactiveDock.innerHTML = `
                <button onclick="triggerConcept('about')" class="w-full text-left p-2 bg-brand-cream hover:bg-stone-100 border border-brand-border rounded-xl text-xs font-medium transition-colors">Who is Aiana? (Credentials & Story)</button>
                <button onclick="triggerConcept('view_terms')" class="w-full text-left p-2 bg-amber-50 hover:bg-amber-100 border border-amber-200 rounded-xl text-xs font-bold text-amber-900 transition-colors">View Terms & Conditions Flyer</button>
                <button onclick="triggerConcept('bundles')" class="w-full text-left p-2 bg-brand-cream hover:bg-stone-100 border border-brand-border rounded-xl text-xs font-medium transition-colors">Full-Blown Bundle Packages</button>
                <button onclick="triggerConcept('tingi_calc')" class="w-full text-left p-2 bg-brand-cream hover:bg-stone-100 border border-brand-border rounded-xl text-xs font-medium transition-colors">Custom "Tingi" Section Calculator</button>
            `;
        }

        function triggerConcept(route) {
            if (route !== 'tingi_calc') backBtn.classList.remove('hidden');

            if (route === 'about') {
                menuTitle.textContent = "About Aiana:";
                appendBotMessage(`<strong>Aiana Academic Commission Services (Est. 2021):</strong><br>• Academic writer from <strong>UST (University of Santo Tomas)</strong>.<br>• Consistent top academic achiever and <strong>Dean's Lister since 2020</strong>.<br>• I provide premium ghostwriting, custom full-blown research analysis, and active tech system software builds for computer science and IT majors!`);
            } 
            else if (route === 'view_terms') {
                menuTitle.textContent = "Terms Flyer Matrix:";
                appendBotMessage(`<div class="rounded-xl overflow-hidden border border-brand-border my-1 shadow-sm bg-stone-100"><img src="faqs.jpg" alt="Terms Flyer" class="w-full h-auto object-contain" onerror="this.parentElement.innerHTML='<div class=\"p-4 text-center text-stone-400 text-xs font-medium\">[ faqs.jpg image not found in folder ]</div>'"></div>`);
            }
            else if (route === 'bundles') {
                menuTitle.textContent = "Flat-rate Packages:";
                appendBotMessage(`<strong>Full-Blown Thesis Packages (Chapters 1-5 Complete):</strong><br>• <strong>Quantitative Study:</strong> ₱5,500<br>• <strong>Qualitative Study:</strong> ₱6,000<br>• <strong>Master's Level Thesis Framework:</strong> ₱8,000<br><br><em>*Note: Package covers full alignment across all elements from titles to end diagnostics!</em>`);
            }
            else if (route === 'rrl') {
                menuTitle.textContent = "Chapter 2 Matrix:";
                appendBotMessage(`<strong>RRL & Reference Sourcing Rules:</strong><br>• <strong>Reference Sourcing Only:</strong> ₱20–₱30 per item just to compile relative links for you.<br>• <strong>Tingi Written Citations:</strong> ₱50 per Foreign item / ₱70 per Local study item (includes reference lists matching APA/prescribed standards).<br>• <strong>Full Chapter 2 Bundle:</strong> Starts at a flat baseline of ₱900.`);
            }
            else if (route === 'systems_others') {
                menuTitle.textContent = "Systems & Extras:";
                appendBotMessage(`<strong>IT/CS Programming Systems & Custom Forms:</strong><br>Yes, I build operational functional systems for IT and Computer Science portfolios! Rates are open-ended and <em>to be discussed</em> on your exact language/framework choice.<br><br><strong>Business Plans / Feasibility Studies:</strong> Flat baseline of ₱1,500. All alternative essay writeups are priced via manual check!`);
            }
            else if (route === 'deadline') {
                menuTitle.textContent = "Duration & Urgent Slots:";
                appendBotMessage(`<strong>Processing Windows & Rush Parameters:</strong><br>• <strong>Standard Delivery:</strong> Completed cleanly within 2-3 working days.<br>• <strong>Rush Turnarounds:</strong> Can handle tight 3-4 hour windows or 1-day submissions. Rush tasks carry an incremental processing premium depending on target timelines!`);
            }
            else if (route === 'tingi_calc') {
                backBtn.classList.remove('hidden');
                menuTitle.textContent = "Toggle parts to update sum:";
                
                let checkListHtml = `<div class="space-y-1 max-h-[110px] overflow-y-auto border border-brand-border p-1.5 rounded-xl bg-stone-50 scrollbar">`;
                for (const [name, price] of Object.entries(itemRegistry)) {
                    checkListHtml += `
                        <label class="flex items-center justify-between text-[11px] p-1 bg-white border border-stone-200 rounded-md cursor-pointer">
                            <span class="flex items-center"><input type="checkbox" value="${name}" onchange="updateLiveCalculation(this)" class="mr-1.5 accent-amber-600"> ${name}</span>
                            <span class="font-bold text-stone-500">₱${price}</span>
                        </label>`;
                }
                checkListHtml += `</div>
                    <label class="flex items-center justify-between text-xs p-1.5 bg-amber-50 border border-amber-200 rounded-xl cursor-pointer">
                        <span class="flex items-center"><input type="checkbox" id="titleCheck" class="mr-1.5 accent-amber-600"> Custom Research Title Proposal</span>
                        <span class="font-bold text-amber-900">+₱50</span>
                    </label>
                    <button onclick="compileCalculatedReceipt()" class="w-full py-1.5 bg-stone-900 text-white font-bold rounded-xl text-xs tracking-wide">Generate Calculation Ticket</button>`;
                
                interactiveDock.innerHTML = checkListHtml;
                appendBotMessage("<strong>Custom Parts Calculator Loaded:</strong> Pick your targeted template components from the interactive menu list, then press the Generate button to auto-calculate your base quote summary!");
            }
        }

        function parseQueryAndRespond(msg) {
            const low = msg.toLowerCase();
            
            if (low.includes('system') || low.includes('coding') || low.includes('programmer') || low.includes('it system') || low.includes('cs')) {
                triggerConcept('systems_others');
            }
            else if (low.includes('magkano') || low.includes('price') || low.includes('rate') || low.includes('how much') || low.includes('calc') || low.includes('tingi') || low.includes('bayad')) {
                if (low.includes('chap 2') || low.includes('rrl') || low.includes('citation')) {
                    triggerConcept('rrl');
                } else if (low.includes('package') || low.includes('buo') || low.includes('full')) {
                    triggerConcept('bundles');
                } else {
                    triggerConcept('tingi_calc');
                }
            }
            else if (low.includes('kailan') || low.includes('kelan') || low.includes('due date') || low.includes('tagal') || low.includes('rush') || low.includes('days') || low.includes('hours')) {
                triggerConcept('deadline');
            }
            else if (low.includes('terms') || low.includes('dp') || low.includes('downpayment') || low.includes('paano') || low.includes('payment')) {
                triggerConcept('view_terms');
            }
            else if (low.includes('sino') || low.includes('aiana') || low.includes('about') || low.includes('ust') || low.includes('school') || low.includes('credentials')) {
                triggerConcept('about');
            }
            else {
                menuTitle.textContent = "Unsure of input:";
                appendBotMessage(`I missed the exact match for that! You can check standard options via the <strong>Main Menu</strong> buttons, calculate custom parts using the <strong>Calculator</strong>, or say keywords like <em>"magkano"</em>, <em>"rush"</em>, <em>"systems"</em>, or <em>"terms"</em>!`);
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;
            appendUserMessage(text);
            userInput.value = '';
            parseQueryAndRespond(text);
        }

        function updateLiveCalculation(checkbox) {
            if (checkbox.checked) { selectedItems.add(checkbox.value); } 
            else { selectedItems.delete(checkbox.value); }
        }

        function compileCalculatedReceipt() {
            let runningSum = 0;
            let breakdownLines = [];

            selectedItems.forEach(item => {
                runningSum += itemRegistry[item];
                breakdownLines.push(`• ${item} (₱${itemRegistry[item]})`);
            });

            if (document.getElementById('titleCheck') && document.getElementById('titleCheck').checked) {
                runningSum += 50;
                breakdownLines.push(`• Research Title Proposal (₱50)`);
            }

            if (breakdownLines.length === 0) {
                alert("Please tick at least one section checkbox element to generate a calculated estimate snapshot summary!");
                return;
            }

            let responseBlock = `<strong>Custom "Tingi" Component Calculation Ticket:</strong><br><br>`;
            responseBlock += breakdownLines.join('<br>') + `<br><br>`;
            responseBlock += `💰 <strong>Calculated Base Total: ₱${runningSum.toLocaleString()}</strong><br><br>`;
            responseBlock += `⚠️ <strong>Note:</strong> Baseline cost is subject to final adjustments based on your school template criteria, timeline layout requirements, and project scope metrics. Shoot me a DM on socials to finalize your slot!`;

            appendUserMessage("Compile Checked Section Estimates");
            appendBotMessage(responseBlock);
        }
    </script>
</body>
</html>
